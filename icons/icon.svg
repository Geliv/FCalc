<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 满画布底色，给 Android maskable 裁剪留足空间 -->
  <rect width="512" height="512" fill="#f7931e" />

  <!-- 轻微高光，让纯色底不至于太平 -->
  <circle cx="168" cy="144" r="220" fill="#ffffff" opacity="0.10" />
  <circle cx="388" cy="392" r="248" fill="#ffb14a" opacity="0.18" />

  <!-- 等号主体，去掉外轮廓和底部深色条 -->
  <rect x="116" y="176" width="280" height="52" rx="22" fill="#fff7ee" />
  <rect x="116" y="284" width="280" height="52" rx="22" fill="#fff7ee" />
</svg>
